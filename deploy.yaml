# =====================
# Mock API Deployment
# =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-api
  template:
    metadata:
      labels:
        app: mock-api
    spec:
      containers:
      - name: mock-api
        image: mock-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

---
# =====================
# Mock API Service
# =====================
apiVersion: v1
kind: Service
metadata:
  name: mock-api-service
spec:
  selector:
    app: mock-api
  ports:
  - port: 8000
    targetPort: 8000

---
# =====================
# HPA
# =====================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mock-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mock-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50